<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeedCheck – Internet Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0a0e1a;
      --card:    #111827;
      --border:  #1f2d45;
      --accent:  #00d4ff;
      --accent2: #7c3aed;
      --green:   #22c55e;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 520px;
      text-align: center;
    }
    .title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 40px; }
    .speed-display {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .speed-unit { font-size: 1rem; color: var(--muted); margin-bottom: 30px; }
    .progress-wrap {
      background: #1a2235;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 36px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.3s ease;
    }
    .status-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 28px; min-height: 22px; }
    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 16px 52px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 24px rgba(0,212,255,0.25);
    }
    .btn-start:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,212,255,0.35); }
    .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
    .results {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-top: 36px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s, transform 0.5s;
    }
    .results.visible { opacity: 1; transform: translateY(0); }
    .result-box {
      background: #0d1524;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 10px;
    }
    .result-box .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .result-box .value { font-size: 1.35rem; font-weight: 700; }
    .result-box.download .value { color: var(--accent); }
    .result-box.upload   .value { color: var(--accent2); }
    .result-box.ping     .value { color: var(--green); }
    .error-msg {
      margin-top: 20px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #f87171;
      display: none;
    }
    .powered { margin-top: 24px; font-size: 0.75rem; color: var(--muted); }
    .powered span { color: #f6821f; font-weight: 600; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">⚡ SpeedCheck</div>
    <div class="subtitle">Test your real internet speed</div>

    <div class="speed-display" id="speedDisplay">0</div>
    <div class="speed-unit" id="speedUnit">Mbps</div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status-label" id="statusLabel">Ready to test</div>
    <button class="btn-start" id="startBtn" onclick="startTest()">Start Test</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="results" id="results">
      <div class="result-box download">
        <div class="label">Download</div>
        <div class="value" id="dlResult">—</div>
      </div>
      <div class="result-box upload">
        <div class="label">Upload</div>
        <div class="value" id="ulResult">—</div>
      </div>
      <div class="result-box ping">
        <div class="label">Ping</div>
        <div class="value" id="pingResult">—</div>
      </div>
    </div>

    <div class="powered">Download & Ping via <span>Cloudflare</span> · Upload via <span>Render</span></div>
  </div>

  <script>
    const CF     = 'https://speed.cloudflare.com';          // download + ping
    const RENDER = 'https://speedcheck-opdv.onrender.com';  // upload (your real server)

    function setProgress(p) { document.getElementById('progressBar').style.width = p + '%'; }
    function setStatus(h)   { document.getElementById('statusLabel').innerHTML = h; }
    function showError(m)   { const e = document.getElementById('errorMsg'); e.textContent = m; e.style.display = 'block'; }
    function hideError()    { document.getElementById('errorMsg').style.display = 'none'; }
    function setSpeed(v)    { document.getElementById('speedDisplay').textContent = v.toFixed(1); }

    function animateNumber(id, from, to, dur, dec = 1) {
      const el = document.getElementById(id);
      const t0 = performance.now();
      function step(now) {
        const p = Math.min((now - t0) / dur, 1);
        const e = 1 - Math.pow(1 - p, 3);
        el.textContent = (from + (to - from) * e).toFixed(dec);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ── Ping: to Cloudflare (real internet latency) ──
    async function measurePing() {
      const times = [];
      for (let i = 0; i < 5; i++) {
        const t0 = performance.now();
        await fetch(CF + '/__down?bytes=0&t=' + Date.now(), { cache: 'no-store' });
        times.push(performance.now() - t0);
      }
      times.sort((a, b) => a - b);
      return Math.round(times[2]); // median
    }

    // ── Download: from Cloudflare (real internet download speed) ──
    async function measureDownload() {
      const files = [500_000, 1_000_000, 2_000_000]; // 0.5MB, 1MB, 2MB
      const speeds = [];

      for (let i = 0; i < files.length; i++) {
        const size = files[i];
        const t0  = performance.now();
        const res = await fetch(CF + '/__down?bytes=' + size + '&t=' + Date.now(), { cache: 'no-store' });
        await res.blob();
        const secs = (performance.now() - t0) / 1000;
        const mbps = (size * 8) / secs / 1e6;
        speeds.push(mbps);
        setSpeed(mbps);
        setProgress(20 + ((i + 1) / files.length) * 35);
      }

      return parseFloat((speeds.reduce((a, b) => a + b) / speeds.length).toFixed(2));
    }

    // ── Upload: to your Render server (real internet upload speed) ──
    // Now this is a real upload going through the internet to Render's servers
    async function measureUpload() {
      const sizes = [500_000, 1_000_000, 2_000_000]; // 0.5MB, 1MB, 2MB
      const speeds = [];

      for (let i = 0; i < sizes.length; i++) {
        const size = sizes[i];
        const blob = new Blob([new ArrayBuffer(size)]); // zeros — no crypto needed

        const t0 = performance.now();
        await fetch(RENDER + '/upload', {
          method: 'POST',
          body: blob,
          headers: { 'Content-Type': 'application/octet-stream' }
        });
        const secs = (performance.now() - t0) / 1000;
        const mbps = (size * 8) / secs / 1e6;
        speeds.push(mbps);
        setSpeed(mbps);
        setProgress(60 + ((i + 1) / sizes.length) * 35);
      }

      return parseFloat((speeds.reduce((a, b) => a + b) / speeds.length).toFixed(2));
    }

    // ── Main ──
    async function startTest() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.textContent = 'Testing...';
      document.getElementById('results').classList.remove('visible');
      document.getElementById('speedDisplay').textContent = '0';
      document.getElementById('speedUnit').textContent = 'Mbps';
      setProgress(0);
      hideError();

      try {
        // 1. Ping
        setStatus('<span class="spinner"></span> Measuring ping...');
        const ping = await measurePing();
        setProgress(15);
        document.getElementById('pingResult').textContent = ping + ' ms';

        // 2. Download
        setStatus('<span class="spinner"></span> Testing download speed...');
        document.getElementById('speedUnit').textContent = 'Mbps  ↓';
        const dl = await measureDownload();
        setProgress(60);
        document.getElementById('dlResult').textContent = dl + ' Mbps';

        // 3. Upload
        setStatus('<span class="spinner"></span> Testing upload speed...');
        document.getElementById('speedUnit').textContent = 'Mbps  ↑';
        const ul = await measureUpload();
        setProgress(100);
        document.getElementById('ulResult').textContent = ul + ' Mbps';

        // Done
        setStatus('✅ Test complete!');
        document.getElementById('results').classList.add('visible');
        setTimeout(() => {
          animateNumber('speedDisplay', ul, dl, 800);
          document.getElementById('speedUnit').textContent = 'Mbps  ↓ Download';
        }, 300);

      } catch (err) {
        setStatus('❌ Test failed');
        showError('Something went wrong. Check your internet connection and try again.');
        console.error(err);
      }

      btn.disabled = false;
      btn.textContent = 'Test Again';
    }
  </script>
</body>
</html>

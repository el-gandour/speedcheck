<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeedCheck – Internet Speed Test</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>

  <!-- Our CSS file -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="card">
    <div class="title">⚡ SpeedCheck</div>
    <div class="subtitle">Test your real internet speed</div>

    <!-- Big speed number shown while test runs -->
    <div class="speed-display" id="speedDisplay">0</div>
    <div class="speed-unit" id="speedUnit">Mbps</div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Status text (Measuring ping... / Testing download...) -->
    <div class="status-label" id="statusLabel">Ready to test</div>

    <!-- Start button -->
    <button class="btn-start" id="startBtn" onclick="startTest()">Start Test</button>

    <!-- Error box (hidden by default) -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Results (hidden until test finishes) -->
    <div class="results" id="results">
      <div class="result-box download">
        <div class="label">Download</div>
        <div class="value" id="dlResult">—</div>
      </div>
      <div class="result-box upload">
        <div class="label">Upload</div>
        <div class="value" id="ulResult">—</div>
      </div>
      <div class="result-box ping">
        <div class="label">Ping</div>
        <div class="value" id="pingResult">—</div>
      </div>
    </div>

    <div class="powered">
      Download & Ping via <span>Cloudflare</span> · Upload via <span>Render</span>
    </div>
  </div>

  <!-- Our JS file -->
  <script src="app.js"></script>

</body>
</html>
